services:
  # Backend API Service
  - type: web
    name: pharma-crm-api
    runtime: python-3.12
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pharma-crm-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: gemma2-9b-it
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: CORS_ORIGINS
        value: https://pharma-crm-frontend.onrender.com
      - key: TRUSTED_HOSTS
        value: localhost,127.0.0.1,.onrender.com
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
    healthCheckPath: /api/v1/health
    autoDeploy: true

  # Frontend Static Site
  - type: web
    name: pharma-crm-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://pharma-crm-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://pharma-crm-api.onrender.com/api/v1

databases:
  - name: pharma-crm-db
    databaseName: neondb
    user: neondb_owner
    plan: free